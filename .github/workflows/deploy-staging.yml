name: Deploy — staging

# Auto-deploy the frontend to the staging AWS environment on merge to main. Builds the SPA with
# staging's VITE_* values, syncs to the staging S3 bucket via the F1 OIDC role, and invalidates
# CloudFront. Backend (Supabase) migrate/deploy is handled by db-deploy.yml (F4).
#
# Gated on the `AWS_DEPLOY_ROLE_ARN` variable existing in the `staging` GitHub Environment, so this
# is a no-op until the AWS account + F2 infra exist (Q-F1).

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual staging redeploys

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # OIDC

jobs:
  deploy:
    name: Build + deploy (staging)
    runs-on: ubuntu-latest
    environment: staging
    # Skip entirely until staging is provisioned (the role var is set in the Environment).
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging env)
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync build to S3
        run: |
          # Hashed assets get a long cache; index.html + non-hashed files must not be cached so a
          # deploy is visible immediately.
          aws s3 sync dist/ "s3://${{ vars.SITE_BUCKET }}/" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" --exclude "*.map"
          aws s3 cp dist/index.html "s3://${{ vars.SITE_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
