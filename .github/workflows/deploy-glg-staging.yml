name: Deploy — GLG staging (manual bucket)

# Auto-deploys the frontend to the hand-provisioned GLG staging environment
# (S3 bucket cornerstone-staging-glg + CloudFront) on every push to the active
# build branch. This is intentionally separate from deploy-staging.yml, which
# targets the Terraform/OIDC infra. Non-secret VITE values (Supabase URL, the
# PUBLIC anon key, google-only flag) are inlined; only AWS creds are secrets.
#
# Required repo config (Settings → Secrets and variables → Actions):
#   Secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   Variables: CLOUDFRONT_DISTRIBUTION_ID   (from the CloudFront console)
# Until AWS_ACCESS_KEY_ID exists, the job is a no-op.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-glg-staging
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  SITE_BUCKET: cornerstone-staging-glg
  VITE_SUPABASE_URL: https://ppefwolueksddgabvseh.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwZWZ3b2x1ZWtzZGRnYWJ2c2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDU1OTIsImV4cCI6MjA5NTkyMTU5Mn0.fcZ8QZVjKsf_TWYfrilrmzV3KL61Xu_73nfr6YmLpos
  VITE_AUTH_GOOGLE_ONLY: "true"

jobs:
  deploy:
    name: Build + deploy (GLG staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          aws s3 sync dist/ "s3://${SITE_BUCKET}/" --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" --exclude "*.map"
          aws s3 cp dist/index.html "s3://${SITE_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
