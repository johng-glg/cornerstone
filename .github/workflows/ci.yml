name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck · lint · test · build · gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Edge-function Zod gate
        run: npm run check:zod

      - name: CORS gate (no wildcard)
        run: npm run check:cors

      - name: Secret scan
        run: npm run check:secrets

      - name: Unit/integration tests (with coverage)
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Dependency audit (block high/critical)
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  db-verify:
    name: DB verify (migrations + RLS/PII isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Boots the local Supabase stack and applies all migrations on first start;
      # a bad migration fails this step. GitHub runners can pull the images (unlike
      # the dev sandbox — see docs/open_questions.md B-A1).
      - name: Start Supabase (applies migrations)
        run: npx supabase start

      - name: Tenant-isolation / PII / audit tests
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/rls_isolation.test.sql

      - name: Stop Supabase
        if: always()
        run: npx supabase stop
