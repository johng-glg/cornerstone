name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck · lint · test · build · gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Edge-function Zod gate
        run: npm run check:zod

      - name: CORS gate (no wildcard)
        run: npm run check:cors

      - name: Secret scan
        run: npm run check:secrets

      - name: Unit/integration tests (with coverage)
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Dependency audit (block high/critical)
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
