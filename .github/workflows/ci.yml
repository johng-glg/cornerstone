name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck · lint · test · build · gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Edge-function Zod gate
        run: npm run check:zod

      - name: CORS gate (no wildcard)
        run: npm run check:cors

      - name: Secret scan
        run: npm run check:secrets

      - name: Unit/integration tests (with coverage)
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Dependency audit (block high/critical)
        # Scope to production deps: the runtime bundle is what ships. Dev-only tooling (e.g. the
        # `supabase` CLI, currently under GHSA-x96m-c5fj-q75c with no fix available) is excluded so
        # a dev-tool advisory can't block delivery. Re-audit dev deps out-of-band.
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  db-verify:
    name: DB verify (migrations + RLS/PII isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only the database is needed to apply migrations + run the SQL tests. Excluding the
      # other services keeps image pulls minimal — fewer pulls dodge ECR anonymous-pull rate
      # limits ("toomanyrequests") and speed the job up.
      - name: Start Supabase (db only; applies migrations)
        run: npx supabase start -x studio,imgproxy,logflare,vector,edge-runtime,supavisor,mailpit,postgres-meta,realtime,storage-api,kong,postgrest

      - name: Tenant-isolation / PII / audit tests
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/rls_isolation.test.sql

      # supabase start loaded supabase/seed.sql (config.toml [db.seed]); this verifies the
      # synthetic multi-tenant dataset is present, login-ready, PII-free, and idempotent.
      # Run from the repo root so the test's `\i supabase/seed.sql` reseed resolves.
      - name: Seed verification (synthetic data present + idempotent)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/seed_verify.test.sql

      - name: Workflow engine (rules fire / gate / block)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/workflow_engine.test.sql

      - name: Workflow engine phase 2 (joined-company entities)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/workflow_engine_phase2.test.sql

      - name: Workflow actions (update_field / auto_graduate)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/workflow_actions.test.sql

      - name: Lead-assignment engine (auto-route on create)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/lead_assignment.test.sql

      - name: Earned-fee AR recognition (accepted + first payment cleared)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/earned_fee_recognition.test.sql

      - name: Stop Supabase
        if: always()
        run: npx supabase stop

  edge-fn-test:
    name: Edge functions (Deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno tests (edge functions)
        # --no-check: run the tests without full type-checking. Deno's type-checker pulls
        # @types/node transitively through esm.sh type graphs; restoring edge-fn type-checking
        # is tracked in open_questions (Q-A8). Tests still execute, validating the pure logic at
        # runtime; src/ is strictly type-checked in the Verify job.
        run: deno test --no-check --allow-net --allow-env --allow-read supabase/functions

# SAST (CodeQL) runs via GitHub's *default* code-scanning setup (repo Settings → Code security),
# not a workflow job here. Default and advanced (in-workflow) CodeQL are mutually exclusive — an
# in-workflow analyze step fails while default setup is enabled — so SAST is intentionally not a
# job in this file. The "CodeQL / Analyze (javascript-typescript|actions)" checks come from
# default setup and gate the PR.
