name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck · lint · test · build · gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Edge-function Zod gate
        run: npm run check:zod

      - name: CORS gate (no wildcard)
        run: npm run check:cors

      - name: Secret scan
        run: npm run check:secrets

      - name: Unit/integration tests (with coverage)
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Dependency audit (block high/critical)
        run: npm audit --audit-level=high

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  db-verify:
    name: DB verify (migrations + RLS/PII isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only the database is needed to apply migrations + run the SQL tests. Excluding the
      # other services keeps image pulls minimal — fewer pulls dodge ECR anonymous-pull rate
      # limits ("toomanyrequests") and speed the job up.
      - name: Start Supabase (db only; applies migrations)
        run: npx supabase start -x studio,imgproxy,logflare,vector,edge-runtime,supavisor,mailpit,postgres-meta,realtime,storage-api,kong,postgrest

      - name: Tenant-isolation / PII / audit tests
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/rls_isolation.test.sql

      # supabase start loaded supabase/seed.sql (config.toml [db.seed]); this verifies the
      # synthetic multi-tenant dataset is present, login-ready, PII-free, and idempotent.
      # Run from the repo root so the test's `\i supabase/seed.sql` reseed resolves.
      - name: Seed verification (synthetic data present + idempotent)
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f tests/db/seed_verify.test.sql

      - name: Stop Supabase
        if: always()
        run: npx supabase stop

  edge-fn-test:
    name: Edge functions (Deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno tests (edge functions)
        # Q-A8 resolved: `--no-check=remote` type-checks our own edge-function source while
        # skipping only the *remote* type graph (esm.sh pulls @types/node transitively, which
        # fails without a node_modules dir). A type error in supabase/functions/** now fails CI,
        # which the previous bare `--no-check` silently allowed. (`--no-check` is a flag on the
        # `test`/`run` subcommands, not on `deno check`.)
        run: deno test --no-check=remote --allow-net --allow-env --allow-read supabase/functions

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    # Prerequisite: code scanning must be enabled for the repo (Settings → Code security →
    # Code scanning). Until then the analyze step cannot upload results and the job fails.
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Security-extended adds the higher-signal security queries on top of the defaults.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
