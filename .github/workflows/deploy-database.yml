name: Deploy — database (migrations)

# Applies Supabase migrations (supabase/migrations/**) to the project via `supabase db push`,
# so schema changes ship through git instead of manual SQL paste. Pairs with
# deploy-edge-functions.yml (functions) and deploy-glg-staging.yml (frontend).
#
# Gated on the `SUPABASE_PROJECT_REF` repo VARIABLE (same one the edge-function deploy uses), so
# it's a no-op until you opt in. Requires:
#   Variable: SUPABASE_PROJECT_REF  = ppefwolueksddgabvseh
#   Secret:   SUPABASE_ACCESS_TOKEN = <supabase.com/dashboard/account/tokens>
#   Secret:   SUPABASE_DB_PASSWORD  = <the database password set when the project was created>
#
# Manual-only by default (workflow_dispatch) so schema changes are deliberate; flip the `push`
# trigger on if you want every migration to auto-apply. The seed is never run (prod-safe).

on:
  workflow_dispatch:
  # push:
  #   branches: [claude/vibrant-bardeen-nwrt8]
  #   paths: ["supabase/migrations/**"]

concurrency:
  group: deploy-database
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    if: vars.SUPABASE_PROJECT_REF != ''
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}" -p "${{ secrets.SUPABASE_DB_PASSWORD }}"
      - name: Push migrations
        run: supabase db push -p "${{ secrets.SUPABASE_DB_PASSWORD }}"
