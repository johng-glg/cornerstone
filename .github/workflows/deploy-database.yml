name: Deploy — database (migrations)

# Applies Supabase migrations (supabase/migrations/**) to the project via `supabase db push`,
# so schema changes ship through git instead of manual SQL paste. Pairs with
# deploy-edge-functions.yml (functions) and deploy-glg-staging.yml (frontend).
#
# Gated on the `SUPABASE_PROJECT_REF` repo VARIABLE (same one the edge-function deploy uses), so
# it's a no-op until you opt in. Requires:
#   Variable: SUPABASE_PROJECT_REF  = ppefwolueksddgabvseh
#   Secret:   SUPABASE_ACCESS_TOKEN = <supabase.com/dashboard/account/tokens>
#   Secret:   SUPABASE_DB_PASSWORD  = <the database password set when the project was created>
#
# Auto-applies on merge to main when a migration changes (plus manual dispatch). The seed is
# never run (prod-safe).

on:
  workflow_dispatch:
    inputs:
      reconcile_baseline:
        description: "One-time: mark all pre-existing migrations as applied (for a DB whose Supabase migration-history table is empty), then push only the new ones."
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]

concurrency:
  group: deploy-database
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Variable or Secret may supply this; falls back to the GLG project ref (non-sensitive).
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF || 'ppefwolueksddgabvseh' }}
    steps:
      - name: Require secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD under Settings → Secrets and variables → Actions → Secrets, then re-run."
            exit 1
          fi
      # Strip stray CR/LF/leading/trailing whitespace from the DB password (a trailing newline in the
      # GitHub secret is the usual cause of a SASL 28P01 with an otherwise-correct password). Re-export
      # the cleaned value for the link/push steps and print only its length (never the value) so the
      # length can be sanity-checked against the real password.
      - name: Sanitize DB password
        run: |
          CLEAN="$(printf '%s' "$SUPABASE_DB_PASSWORD" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          echo "::add-mask::$CLEAN"
          echo "SUPABASE_DB_PASSWORD=$CLEAN" >> "$GITHUB_ENV"
          echo "DB password length (raw=${#SUPABASE_DB_PASSWORD}, cleaned=${#CLEAN})"
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"
      # One-time reconciliation: this project's schema predates Supabase migration tracking, so the
      # remote history is empty and `db push` would try to replay every migration and collide with
      # existing objects. Mark all migrations EXCEPT the new forecasting ones as already-applied, so
      # the push that follows applies only 20260604180000 + 20260605120000. Safe to leave off after.
      - name: Reconcile baseline history (one-time)
        if: ${{ inputs.reconcile_baseline }}
        run: |
          VERS=$(ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -n1 basename \
            | grep -oE '^[0-9]{14}' \
            | grep -vE '^(20260604180000|20260605120000)$' \
            | sort -u | tr '\n' ' ')
          echo "Marking as already-applied: $VERS"
          supabase migration repair --status applied $VERS
      - name: Push migrations
        run: supabase db push -p "$SUPABASE_DB_PASSWORD"
