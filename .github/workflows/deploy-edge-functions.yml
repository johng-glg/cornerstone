name: Deploy — edge functions

# Deploys all Supabase edge functions (Forth, Dialpad, DocuSeal, PLSA, provisioning) to the
# project. Per-function config (verify_jwt, etc.) comes from supabase/config.toml.
#
# Only requirement: the SUPABASE_ACCESS_TOKEN secret
# (Settings → Secrets and variables → Actions → Secrets):
#   Secret: SUPABASE_ACCESS_TOKEN = <a Supabase access token from supabase.com/dashboard/account/tokens>
#
# The project ref is not sensitive; it defaults to the GLG project below but can be overridden by a
# `SUPABASE_PROJECT_REF` Variable OR Secret (either tab works). Vendor API keys are set separately
# as function secrets — see docs/runbooks/edge-functions-deploy.md.

on:
  push:
    branches: [claude/vibrant-bardeen-nwrt8]
    paths: ["supabase/functions/**", ".github/workflows/deploy-edge-functions.yml"]
  workflow_dispatch:

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Variable or Secret may supply this; falls back to the GLG project ref (non-sensitive).
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF || 'ppefwolueksddgabvseh' }}
    steps:
      - name: Require access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it under Settings → Secrets and variables → Actions → Secrets, then re-run."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
